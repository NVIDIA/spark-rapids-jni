ci:
  autofix_commit_msg: "[pre-commit.ci] auto code formatting"
  autofix_prs: false
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: quarterly
  submodules: true

repos:
  - repo: local
    hooks:
      - id: check-clang-format-version
        name: Check clang-format version matches cudf
        entry: >-
          bash -c '
          clang_format_pattern="https://github.com/pre-commit/mirrors-clang-format";
          our_ver=$(grep -A1 "repo: $clang_format_pattern" ".pre-commit-config.yaml" | grep "rev:" | tail -1 | sed "s/.*rev: *//");
          cudf_ver=$(grep -A1 "repo: $clang_format_pattern" "thirdparty/cudf/.pre-commit-config.yaml" | grep "rev:" | tail -1 | sed "s/.*rev: *//");
          if [ -z "$our_ver" ] || [ -z "$cudf_ver" ] || [ "$our_ver" != "$cudf_ver" ]; then
            echo "ERROR: clang-format version mismatch or failed to extract version!";
            echo "  spark-rapids-jni: ${our_ver:-(empty)}";
            echo "  cudf:             ${cudf_ver:-(empty)}";
            echo "Please update .pre-commit-config.yaml to use the same rev as cudf";
            exit 1;
          fi'
        language: system
        always_run: true
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.4
    hooks:
      - id: clang-format
        types_or: [c, c++, cuda]
        args: ["-fallback-style=none", "-style=file:thirdparty/cudf/.clang-format", "-i"]
